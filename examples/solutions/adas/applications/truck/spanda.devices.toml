# Commercial truck — long-range sensing and rear coverage
[fleet]
id = "truck-fleet"

[[fleet.robots]]
id = "vehicle-truck-001"
model = "CommercialTruck"
hardware_profile = "JetsonAutomotive"

[fleet.robots.compute]
id = "compute-truck-001"
type = "JetsonOrin"
serial = "JTN-TRUCK-001"

[[fleet.robots.compute.devices]]
id = "front-camera"
type = "Camera"
provider = "spanda-opencv"
mount = "front"
capabilities = ["lane_detection", "traffic_sign_recognition", "pedestrian_detection"]

[[fleet.robots.compute.devices]]
id = "front-radar-long"
type = "Radar"
provider = "spanda-slam"
mount = "front"
capabilities = ["obstacle_detection", "adaptive_speed_control"]

[[fleet.robots.compute.devices]]
id = "rear-radar"
type = "Radar"
provider = "spanda-slam"
mount = "rear"
capabilities = ["obstacle_detection", "blind_spot_monitoring"]

[[fleet.robots.compute.devices]]
id = "front-lidar"
type = "Lidar"
provider = "spanda-slam"
mount = "front"
capabilities = ["obstacle_detection", "localization"]

[[fleet.robots.compute.devices]]
id = "gps-receiver"
type = "GPS"
provider = "spanda-gps"
capabilities = ["localization", "route_following"]

[[fleet.robots.compute.devices]]
id = "imu"
type = "IMU"
provider = "spanda-fusion"
capabilities = ["localization"]

[[fleet.robots.compute.devices]]
id = "drive-controller"
type = "DifferentialDrive"
provider = "spanda-canbus"
bus = "can1"
capabilities = ["move", "stop", "emergency_stop"]

[[fleet.robots.compute.devices]]
id = "vehicle-canbus"
type = "CommunicationGateway"
provider = "spanda-canbus"
bus = "can0"
capabilities = ["steering_control", "emergency_braking", "adaptive_speed_control"]

[[fleet.robots.compute.devices]]
id = "comm-gateway"
type = "CommunicationGateway"
provider = "spanda-mqtt"
capabilities = ["telemetry_streaming", "secure_communication"]

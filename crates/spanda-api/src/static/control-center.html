<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Spanda Control Center</title>
  <style>
    :root { font-family: system-ui, sans-serif; color: #e8e8e8; background: #0f1419; }
    body { margin: 0; padding: 1rem 1.5rem; }
    h1 { margin: 0 0 0.25rem; font-size: 1.5rem; }
    .subtitle { color: #8b9bb4; margin: 0 0 1rem; }
    nav { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    nav button { background: #1a2332; color: #c8d6e5; border: 1px solid #2d3a4f; padding: 0.4rem 0.8rem; border-radius: 6px; cursor: pointer; }
    nav button.active { background: #2563eb; border-color: #2563eb; color: #fff; }
    .panel { background: #1a2332; border: 1px solid #2d3a4f; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.75rem; }
    .stat { background: #0f1419; padding: 0.75rem; border-radius: 6px; }
    .stat dt { font-size: 0.75rem; color: #8b9bb4; margin: 0; }
    .stat dd { font-size: 1.25rem; margin: 0.25rem 0 0; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th, td { text-align: left; padding: 0.4rem 0.5rem; border-bottom: 1px solid #2d3a4f; }
    .error { color: #f87171; }
    .ok { color: #4ade80; }
    pre { overflow: auto; font-size: 0.8rem; }
    .dt-filters { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.75rem; align-items: flex-end; }
    .dt-filters label { display: flex; flex-direction: column; gap: 0.2rem; font-size: 0.75rem; color: #8b9bb4; }
    .dt-filters input { background: #0f1419; border: 1px solid #2d3a4f; color: #e8e8e8; border-radius: 6px; padding: 0.35rem 0.5rem; }
    .dt-graph-wrap { overflow: auto; max-height: 420px; border: 1px solid #2d3a4f; border-radius: 8px; background: #0f1419; margin-bottom: 0.75rem; }
    .dt-graph-wrap svg { display: block; }
    .dt-legend { display: flex; flex-wrap: wrap; gap: 0.5rem 1rem; font-size: 0.75rem; color: #8b9bb4; margin-bottom: 0.5rem; }
    .dt-detail { font-size: 0.85rem; margin: 0.5rem 0; }
    .auth-setup { border-color: #854d0e; background: #1c1910; }
    .auth-setup input { background: #0f1419; border: 1px solid #2d3a4f; color: #e8e8e8; border-radius: 6px; padding: 0.35rem 0.5rem; min-width: 16rem; }
    .auth-setup button { background: #2563eb; color: #fff; border: none; border-radius: 6px; padding: 0.35rem 0.75rem; cursor: pointer; margin-right: 0.5rem; }
    .auth-setup button.secondary { background: #1a2332; border: 1px solid #2d3a4f; color: #c8d6e5; }
    .auth-status { color: #4ade80; font-size: 0.85rem; margin: 0 0 0.75rem; }
    .role-badge { display: inline-block; color: #fff; font-size: 0.7rem; padding: 0.15rem 0.45rem; border-radius: 4px; margin-left: 0.35rem; text-transform: capitalize; }
    .role-badge.administrator { background: #2563eb; }
    .role-badge.supervisor { background: #0891b2; }
    .role-badge.developer { background: #7c3aed; }
    .role-badge.operator { background: #16a34a; }
    .role-badge.safety_officer { background: #ea580c; }
    .role-badge.auditor { background: #a855f7; }
    .role-badge.guest { background: #475569; }
    .role-tab-hint { color: #8b9bb4; font-size: 0.8rem; margin: 0 0 0.75rem; padding: 0.5rem 0.65rem; background: #0f1419; border-radius: 6px; border-left: 3px solid #2563eb; }
    .role-tab-hint.operator { border-left-color: #16a34a; }
    .role-tab-hint.auditor { border-left-color: #a855f7; }
    .role-tab-hint.safety_officer { border-left-color: #ea580c; }
    .role-tab-hint.developer { border-left-color: #7c3aed; }
    .role-tab-hint.supervisor { border-left-color: #0891b2; }
    .action-bar { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 0.75rem 0; align-items: center; }
    .action-bar button, .panel button { background: #2563eb; color: #fff; border: none; border-radius: 6px; padding: 0.35rem 0.75rem; cursor: pointer; font-size: 0.85rem; }
    .action-bar button:disabled, .panel button:disabled { opacity: 0.45; cursor: not-allowed; }
    .action-bar button.secondary, .panel button.secondary { background: #1a2332; border: 1px solid #2d3a4f; color: #c8d6e5; }
    .hint { color: #8b9bb4; font-size: 0.8rem; }
    nav button[data-role-tier] { border-style: dashed; }
    nav button.hidden-tab { display: none; }
    .perm-tags { display: flex; flex-wrap: wrap; gap: 0.25rem; margin: 0.5rem 0; }
    .perm-tag { background: #0f1419; border: 1px solid #2d3a4f; border-radius: 4px; padding: 0.15rem 0.4rem; font-size: 0.7rem; color: #94a3b8; }
    .perm-tag.ok { border-color: #166534; color: #4ade80; }
  </style>
</head>
<body>
  <h1>Spanda Control Center</h1>
  <p class="subtitle">Enterprise operations — Dashboard · Fleet · Readiness · Device Pool</p>
  <p id="auth-status" class="auth-status" hidden></p>
  <div id="auth-setup" class="panel auth-setup" hidden></div>
  <nav id="main-nav">
    <button type="button" class="active" data-tab="dashboard">Dashboard</button>
    <button type="button" data-tab="entities" data-role-tier="ops">Entities</button>
    <button type="button" data-tab="devices">Device Pool</button>
    <button type="button" data-tab="fleet">Fleet</button>
    <button type="button" data-tab="discovery" data-role-tier="ops">Discovery</button>
    <button type="button" data-tab="provision" data-role-tier="ops">Provision</button>
    <button type="button" data-tab="mapping">Mapping</button>
    <button type="button" data-tab="config" data-role-tier="ops">Config</button>
    <button type="button" data-tab="health">Health</button>
    <button type="button" data-tab="readiness">Readiness</button>
    <button type="button" data-tab="drift" data-role-tier="ops">Drift</button>
    <button type="button" data-tab="alerts">Alerts</button>
    <button type="button" data-tab="security">Security</button>
    <button type="button" data-tab="ota" data-role-tier="ops">OTA</button>
    <button type="button" data-tab="sre">SRE</button>
    <button type="button" data-tab="compliance" data-role-tier="govern">Compliance</button>
    <button type="button" data-tab="audit" data-role-tier="govern">Audit</button>
    <button type="button" data-tab="decisions" data-role-tier="ops">Decisions</button>
    <button type="button" data-tab="digital-thread">Digital Thread</button>
    <button type="button" data-tab="traceability">Traceability</button>
    <button type="button" data-tab="analytics" data-role-tier="govern">Analytics</button>
    <button type="button" data-tab="twins">Twin Cloud</button>
    <button type="button" data-tab="operator" data-role-tier="ops">Operator</button>
    <button type="button" data-tab="assurance">Assurance</button>
    <button type="button" data-tab="diagnosis">Diagnosis</button>
    <button type="button" data-tab="recovery" data-role-tier="ops">Recovery</button>
    <button type="button" data-tab="adas">ADAS</button>
    <button type="button" data-tab="humans">Humans</button>
    <button type="button" data-tab="smart-spaces">Smart Spaces</button>
    <button type="button" data-tab="executive">Executive</button>
  </nav>
  <div id="error" class="error" hidden></div>
  <section id="tab-dashboard" class="panel"></section>
  <section id="tab-entities" class="panel" hidden></section>
  <section id="tab-fleet" class="panel" hidden></section>
  <section id="tab-readiness" class="panel" hidden></section>
  <section id="tab-devices" class="panel" hidden></section>
  <section id="tab-discovery" class="panel" hidden></section>
  <section id="tab-alerts" class="panel" hidden></section>
  <section id="tab-health" class="panel" hidden></section>
  <section id="tab-assurance" class="panel" hidden></section>
  <section id="tab-diagnosis" class="panel" hidden></section>
  <section id="tab-recovery" class="panel" hidden></section>
  <section id="tab-provision" class="panel" hidden></section>
  <section id="tab-mapping" class="panel" hidden></section>
  <section id="tab-config" class="panel" hidden></section>
  <section id="tab-drift" class="panel" hidden></section>
  <section id="tab-ota" class="panel" hidden></section>
  <section id="tab-security" class="panel" hidden></section>
  <section id="tab-sre" class="panel" hidden></section>
  <section id="tab-compliance" class="panel" hidden></section>
  <section id="tab-operator" class="panel" hidden></section>
  <section id="tab-audit" class="panel" hidden></section>
  <section id="tab-decisions" class="panel" hidden></section>
  <section id="tab-digital-thread" class="panel" hidden></section>
  <section id="tab-traceability" class="panel" hidden></section>
  <section id="tab-analytics" class="panel" hidden></section>
  <section id="tab-twins" class="panel" hidden></section>
  <section id="tab-adas" class="panel" hidden></section>
  <section id="tab-humans" class="panel" hidden></section>
  <section id="tab-smart-spaces" class="panel" hidden></section>
  <section id="tab-executive" class="panel" hidden></section>
  <script>
    const tabs = ["dashboard", "entities", "devices", "fleet", "discovery", "provision", "mapping", "config", "health", "readiness", "drift", "alerts", "security", "ota", "sre", "compliance", "audit", "decisions", "digital-thread", "traceability", "analytics", "twins", "operator", "assurance", "diagnosis", "recovery", "adas", "humans", "smart-spaces", "executive"];
    const errEl = document.getElementById("error");
    const AUTH_STORAGE_PREFIX = "spanda.control_center.bearer_token.v1:";
    const RBAC_ACTIONS = ["Deploy", "Operate", "Approve", "Override", "Shutdown", "Recover", "Delete", "Provision"];
    const TAB_ACCESS = {
      dashboard: ["*"],
      entities: ["administrator", "supervisor", "developer"],
      devices: ["*"],
      fleet: ["*"],
      discovery: ["administrator", "supervisor", "developer", "operator", "safety_officer"],
      provision: ["administrator", "supervisor", "developer", "operator", "safety_officer"],
      mapping: ["*"],
      config: ["administrator", "supervisor", "developer"],
      health: ["*"],
      readiness: ["*"],
      drift: ["administrator", "supervisor", "developer"],
      alerts: ["*"],
      security: ["*"],
      ota: ["administrator", "supervisor", "developer"],
      sre: ["*"],
      compliance: ["administrator", "supervisor", "developer", "auditor", "safety_officer"],
      audit: ["administrator", "supervisor", "developer", "auditor"],
      decisions: ["administrator", "supervisor", "developer"],
      "digital-thread": ["*"],
      traceability: ["*"],
      analytics: ["administrator", "supervisor", "developer", "auditor"],
      twins: ["*"],
      operator: ["administrator", "supervisor", "operator", "safety_officer"],
      assurance: ["*"],
      diagnosis: ["*"],
      adas: ["*"],
      humans: ["*"],
      "smart-spaces": ["*"],
      executive: ["*"],
    };
    const ROLE_META = {
      guest: {
        label: "Guest",
        summary: "Read-only dashboards. Paste a Bearer token to unlock role-specific operations.",
      },
      auditor: {
        label: "Auditor",
        summary: "Read-only compliance and audit views. No mutation actions.",
      },
      operator: {
        label: "Operator",
        summary: "Day-to-day fleet operations: incidents, provisioning, quarantine, recovery.",
      },
      developer: {
        label: "Developer",
        summary: "Deploy and configure: snapshots, drift, OTA plans, entities, decisions.",
      },
      safety_officer: {
        label: "Safety Officer",
        summary: "Safety approvals, shutdown workflows, and compliance export.",
      },
      supervisor: {
        label: "Supervisor",
        summary: "Full operational control except delete.",
      },
      administrator: {
        label: "Administrator",
        summary: "Full access to every tab and mutation action.",
      },
    };
    const TAB_HINTS = {
      sre: { operator: "Open, acknowledge, and resolve incidents.", safety_officer: "Monitor incidents and safety-related alerts." },
      provision: { operator: "Trust, provision, assign, and quarantine devices.", developer: "Run full provision workflows against the device pool." },
      compliance: { auditor: "Review signed profile catalog. Export requires Deploy permission.", safety_officer: "Export safety profiles when Deploy is granted; approve missions on Humans tab." },
      audit: { auditor: "Mutation audit log requires Deploy permission to load via API." },
      humans: { safety_officer: "Approve or reject pending mission approvals.", operator: "View operator readiness and HRI sessions." },
      config: { developer: "Save snapshots and submit config publish approvals.", supervisor: "Approve or reject pending config publishes." },
      operator: { operator: "Mission approvals and quarantine workflows.", safety_officer: "Approve missions and safety-critical operator actions." },
    };
    window.RBAC_CTX = null;
    window.selectedDeviceId = "";
    window.selectedEntityId = "";
    window.complianceProfile = "defense";

    function can(action) {
      if (!window.RBAC_CTX || !window.RBAC_CTX.permissions) return false;
      return window.RBAC_CTX.permissions.includes(action);
    }

    function hasToken() {
      return Boolean(window.SPANDA_API_KEY);
    }

    function roleName() {
      if (!window.RBAC_CTX) return "guest";
      const role = window.RBAC_CTX.role;
      return typeof role === "string" ? role : "guest";
    }

    function effectiveRole() {
      return hasToken() ? roleName() : "guest";
    }

    function roleMeta() {
      return ROLE_META[effectiveRole()] || ROLE_META.guest;
    }

    function tabAllowed(tab) {
      const access = TAB_ACCESS[tab];
      if (!access) return true;
      if (access.includes("*")) return true;
      return access.includes(effectiveRole());
    }

    function isReadOnlyRole() {
      const role = effectiveRole();
      return role === "guest" || role === "auditor";
    }

    function permTagsHtml() {
      if (!window.RBAC_CTX) return "";
      return '<div class="perm-tags">' + RBAC_ACTIONS.map((a) =>
        '<span class="perm-tag' + (can(a) ? " ok" : "") + '">' + a + "</span>"
      ).join("") + "</div>";
    }

    function actionBtn(label, onclick, action, extra) {
      const allowed = can(action);
      const disabled = !allowed || !hasToken();
      const title = !hasToken()
        ? "Paste a Bearer token above"
        : !allowed
          ? "Role lacks " + action + " permission"
          : "";
      return '<button type="button" class="secondary"' +
        (disabled ? " disabled" : "") +
        (title ? ' title="' + title + '"' : "") +
        ' onclick="' + onclick + '"' +
        (extra || "") +
        ">" + label + "</button>";
    }

    function actionBar(buttons) {
      return '<div class="action-bar">' + buttons.join("") + "</div>";
    }

    function roleBadgeHtml() {
      const role = effectiveRole();
      const meta = roleMeta();
      return '<span class="role-badge ' + role + '">' + meta.label + "</span>";
    }

    function tabHintHtml(tab) {
      const hints = TAB_HINTS[tab];
      if (!hints) return "";
      const role = effectiveRole();
      const text = hints[role];
      if (!text) return "";
      return '<p class="role-tab-hint ' + role + '"><strong>' + roleMeta().label + ":</strong> " + text + "</p>";
    }

    window.switchTab = (tab) => {
      if (!tabAllowed(tab)) return;
      document.querySelectorAll("nav button").forEach((b) => b.classList.remove("active"));
      const btn = document.querySelector('nav button[data-tab="' + tab + '"]');
      if (btn) btn.classList.add("active");
      tabs.forEach((t) => {
        document.getElementById("tab-" + t).hidden = t !== tab;
      });
      const loaders = {
        dashboard: loadDashboard,
        entities: loadEntities,
        fleet: loadFleet,
        readiness: loadReadiness,
        devices: loadDevices,
        discovery: loadDiscovery,
        alerts: loadAlerts,
        health: loadHealth,
        assurance: loadAssurance,
        diagnosis: loadDiagnosis,
        recovery: loadRecovery,
        provision: loadProvision,
        mapping: loadMapping,
        config: loadConfig,
        drift: loadDrift,
        ota: loadOta,
        security: loadSecurity,
        sre: loadSre,
        compliance: loadCompliance,
        operator: loadOperator,
        audit: loadAudit,
        decisions: loadDecisions,
        "digital-thread": loadDigitalThread,
        traceability: loadTraceability,
        analytics: loadAnalytics,
        twins: loadTwins,
        adas: loadAdas,
        humans: loadHumans,
        "smart-spaces": loadSmartSpaces,
        executive: loadExecutive,
      };
      if (loaders[tab]) loaders[tab]();
    };

    function ensureActiveTabVisible() {
      const active = document.querySelector("nav button.active");
      const tab = active && active.dataset.tab;
      if (tab && tabAllowed(tab)) return;
      switchTab("dashboard");
    }

    function updateNavForRole() {
      document.querySelectorAll("nav button[data-tab]").forEach((btn) => {
        const tab = btn.dataset.tab;
        const allowed = tabAllowed(tab);
        btn.classList.toggle("hidden-tab", !allowed);
        btn.title = allowed ? "" : "Not available for " + roleMeta().label + " role";
      });
      ensureActiveTabVisible();
    }

    async function refreshRbacContext() {
      if (!window.SPANDA_API_KEY) {
        window.RBAC_CTX = null;
        updateNavForRole();
        renderAuthStatus();
        switchTab("dashboard");
        return;
      }
      try {
        const res = await fetch("/v1/rbac/me", {
          headers: { Authorization: "Bearer " + window.SPANDA_API_KEY },
        });
        if (!res.ok) throw new Error("rbac/me " + res.status);
        window.RBAC_CTX = await res.json();
      } catch (_error) {
        window.RBAC_CTX = { role: "guest", permissions: [] };
      }
      updateNavForRole();
      renderAuthStatus();
      const active = document.querySelector("nav button.active");
      if (active && active.dataset.tab) switchTab(active.dataset.tab);
    }

    function renderAuthStatus() {
      const status = document.getElementById("auth-status");
      if (!window.SPANDA_API_KEY) {
        status.hidden = true;
        return;
      }
      status.hidden = false;
      const meta = roleMeta();
      status.innerHTML =
        "Signed in as " + roleBadgeHtml() +
        (window.RBAC_CTX && window.RBAC_CTX.key_id ? " (<code>" + window.RBAC_CTX.key_id + "</code>)" : "") +
        " on <code>" + location.host + "</code>. " +
        "<span class='hint'>" + meta.summary + "</span>" +
        permTagsHtml() +
        ' <button type="button" id="auth-key-forget" class="secondary" style="font-size:0.8rem;padding:0.2rem 0.5rem;margin-left:0.5rem;background:#1a2332;border:1px solid #2d3a4f;color:#c8d6e5;border-radius:6px;cursor:pointer;">Forget token</button>';
      document.getElementById("auth-key-forget").addEventListener("click", () => {
        window.SPANDA_API_KEY = "";
        window.RBAC_CTX = null;
        clearStoredApiKey();
        status.hidden = true;
        updateNavForRole();
        switchTab("dashboard");
        initAuthSetup();
      });
    }

    function authStorageKey() {
      return AUTH_STORAGE_PREFIX + location.host;
    }

    function loadStoredApiKey() {
      try {
        const value = localStorage.getItem(authStorageKey());
        return value && value.trim() ? value.trim() : "";
      } catch (_error) {
        return "";
      }
    }

    function saveStoredApiKey(value) {
      try {
        localStorage.setItem(authStorageKey(), value);
      } catch (_error) {
        /* private mode or blocked storage */
      }
    }

    function clearStoredApiKey() {
      try {
        localStorage.removeItem(authStorageKey());
      } catch (_error) {
        /* ignore */
      }
    }

    async function setApiKey(value, { persist }) {
      window.SPANDA_API_KEY = value;
      if (persist) {
        saveStoredApiKey(value);
      }
      document.getElementById("auth-setup").hidden = true;
      await refreshRbacContext();
    }

    async function verifyApiKey(value) {
      const res = await fetch("/v1/alerts/test", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: "Bearer " + value,
        },
      });
      if (!res.ok) {
        throw new Error("token rejected (" + res.status + ")");
      }
      return res.json();
    }

    function initAuthSetup() {
      if (window.SPANDA_API_KEY) {
        void setApiKey(window.SPANDA_API_KEY, { persist: false });
        return;
      }
      const stored = loadStoredApiKey();
      if (stored) {
        window.SPANDA_API_KEY = stored;
        void setApiKey(stored, { persist: false });
        return;
      }
      const panel = document.getElementById("auth-setup");
      panel.hidden = false;
      panel.innerHTML = `
        <h2>Operator API key</h2>
        <p>Mutations require a Bearer token registered on the server (<code>SPANDA_API_KEY</code> or <code>SPANDA_API_KEYS_FILE</code>).</p>
        <p class="hint">Roles: <strong>administrator</strong> (full), <strong>supervisor</strong> (no delete), <strong>developer</strong> (deploy/operate), <strong>operator</strong> (incidents/recovery), <strong>safety_officer</strong> (approve/shutdown), <strong>auditor</strong> (read-only audit/compliance). Tabs and actions adapt to your role after sign-in.</p>
        <pre>spanda control-center api-key generate --export</pre>
        <p>Paste the token below. Optionally remember it in this browser (same origin only, scoped to <code>${location.host}</code>).</p>
        <label>
          Bearer token
          <input id="auth-key-input" type="password" autocomplete="off" placeholder="paste token from api-keys.json or generate" />
        </label>
        <label style="display:flex;flex-direction:row;align-items:center;gap:0.35rem;margin:0.5rem 0;font-size:0.85rem;color:#c8d6e5;">
          <input id="auth-key-remember" type="checkbox" checked />
          Remember on this browser
        </label>
        <button type="button" id="auth-key-save">Use token</button>
        <span id="auth-key-error" class="error" hidden></span>`;
      document.getElementById("auth-key-save").addEventListener("click", async () => {
        const value = (document.getElementById("auth-key-input").value || "").trim();
        const errorEl = document.getElementById("auth-key-error");
        const remember = document.getElementById("auth-key-remember").checked;
        errorEl.hidden = true;
        if (!value) return;
        try {
          await verifyApiKey(value);
          await setApiKey(value, { persist: remember });
        } catch (error) {
          errorEl.hidden = false;
          errorEl.textContent =
            "Token not accepted: " +
            error.message +
            ". Ensure the server was started with this key in SPANDA_API_KEYS_FILE or SPANDA_API_KEY.";
        }
      });
    }

    initAuthSetup();
    updateNavForRole();

    document.querySelectorAll("nav button").forEach((btn) => {
      btn.addEventListener("click", () => {
        switchTab(btn.dataset.tab);
      });
    });

    async function api(path) {
      const res = await fetch(path);
      if (!res.ok) throw new Error(path + " returned " + res.status);
      return res.json();
    }

    async function apiAuth(method, path, body) {
      const key = window.SPANDA_API_KEY || "";
      const res = await fetch(path, {
        method,
        headers: {
          "Content-Type": "application/json",
          ...(key ? { Authorization: "Bearer " + key } : {}),
        },
        body: body != null ? JSON.stringify(body) : method === "GET" ? undefined : undefined,
      });
      if (!res.ok) throw new Error(path + " returned " + res.status);
      const text = await res.text();
      return text ? JSON.parse(text) : {};
    }

    window.sreAckIncident = async (id) => {
      await apiAuth("POST", "/v1/sre/incidents/" + encodeURIComponent(id) + "/ack", { assignee: "operator" });
      await loadSre();
    };
    window.sreResolveIncident = async (id) => {

    function renderDigitalThreadGraph(container, thread, detailEl) {
      const nodes = (thread.graph && thread.graph.nodes) || [];
      const edges = (thread.graph && thread.graph.edges) || [];
      const kindCol = { mission: 0, robot: 1, capability: 2, hardware: 3, sensor: 3, actuator: 3, provider: 4, package: 5, safety: 6 };
      const kindColor = { mission: "#6366f1", robot: "#3b82f6", capability: "#eab308", hardware: "#94a3b8", sensor: "#22d3ee", actuator: "#f97316", provider: "#22c55e", package: "#a3e635", safety: "#f87171" };
      const NW = 128, NH = 36, COL = 168, ROW = 52, PAD = 28;
      const colRows = {};
      const positions = {};
      nodes.slice().sort((a, b) => (kindCol[a.kind] ?? 3) - (kindCol[b.kind] ?? 3) || a.label.localeCompare(b.label)).forEach((n) => {
        const c = kindCol[n.kind] ?? 3;
        const r = colRows[c] || 0;
        colRows[c] = r + 1;
        positions[n.id] = { x: PAD + c * COL, y: PAD + r * ROW };
      });
      let maxRow = 1;
      Object.values(colRows).forEach((r) => { if (r > maxRow) maxRow = r; });
      const W = PAD * 2 + 6 * COL + NW;
      const H = PAD * 2 + maxRow * ROW + NH;
      const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.setAttribute("width", W);
      svg.setAttribute("height", H);
      svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
      let selected = null;
      const nodeMap = Object.fromEntries(nodes.map((n) => [n.id, n]));

      function neighbors(id) {
        const set = new Set([id]);
        edges.forEach((e) => {
          if (e.from === id) set.add(e.to);
          if (e.to === id) set.add(e.from);
        });
        return set;
      }

      function draw() {
        while (svg.firstChild) svg.removeChild(svg.firstChild);
        const linked = selected ? neighbors(selected) : null;
        edges.forEach((e) => {
          const f = positions[e.from], t = positions[e.to];
          if (!f || !t) return;
          const active = !linked || (linked.has(e.from) && linked.has(e.to));
          const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
          const x1 = f.x + NW, y1 = f.y + NH / 2, x2 = t.x, y2 = t.y + NH / 2, mx = (x1 + x2) / 2;
          path.setAttribute("d", `M ${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2} ${y2}`);
          path.setAttribute("fill", "none");
          path.setAttribute("stroke", active ? "#58a6ff" : "#2d3a4f");
          path.setAttribute("stroke-width", active ? "2" : "1");
          path.setAttribute("opacity", active ? "0.9" : "0.35");
          svg.appendChild(path);
        });
        nodes.forEach((n) => {
          const p = positions[n.id];
          if (!p) return;
          const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
          g.setAttribute("transform", `translate(${p.x},${p.y})`);
          g.style.cursor = "pointer";
          const dim = linked && !linked.has(n.id);
          g.setAttribute("opacity", dim ? "0.35" : "1");
          const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
          rect.setAttribute("width", NW);
          rect.setAttribute("height", NH);
          rect.setAttribute("rx", "6");
          rect.setAttribute("fill", kindColor[n.kind] || "#64748b");
          rect.setAttribute("stroke", n.id === selected ? "#f0f6fc" : "#0f1419");
          rect.setAttribute("stroke-width", n.id === selected ? "2" : "1");
          const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
          text.setAttribute("x", NW / 2);
          text.setAttribute("y", NH / 2 + 4);
          text.setAttribute("text-anchor", "middle");
          text.setAttribute("font-size", "11");
          text.setAttribute("fill", "#0f1419");
          const label = n.label.length > 16 ? n.label.slice(0, 14) + "…" : n.label;
          text.textContent = label;
          g.appendChild(rect);
          g.appendChild(text);
          g.addEventListener("click", () => {
            selected = selected === n.id ? null : n.id;
            const node = nodeMap[selected];
            if (!selected || !node) {
              detailEl.textContent = "";
            } else {
              detailEl.textContent = `${node.kind}: ${node.label} (${node.id})`;
            }
            draw();
          });
          svg.appendChild(g);
        });
      }
      draw();
      container.appendChild(svg);
    }

          <h3>Context awareness</h3>
          <pre>${JSON.stringify(context, null, 2)}</pre>
          <h3>Human digital twins</h3>
          <table><thead><tr><th>Twin</th><th>Entity</th><th>Mirror</th><th>Replay</th></tr></thead><tbody>${twinRows || "<tr><td colspan=4>none</td></tr>"}</tbody></table>
          <h3>Mission approval queue</h3>
          <table><thead><tr><th>ID</th><th>Mission</th><th>Requested by</th><th>Status</th><th>Actions</th></tr></thead><tbody>${approvalRows || "<tr><td colspan=5>none</td></tr>"}</tbody></table>
          <p>Approve: <code>POST /v1/operator/mission/approve</code> with Bearer token · List: <code>GET /v1/operator/mission/approvals</code></p>
          <p>Annotate: <code>POST /v1/hri/sessions/{id}/annotate</code> · Operator readiness: <code>GET /v1/humans/{id}/readiness</code> · Team: <code>GET /v1/humans/readiness</code></p>
          <h3>VR training</h3>
          <p>Record: <code>spanda sim vr-training/training_mission.sd --record</code> · Replay: <code>spanda replay training_mission.trace --playback</code></p>
          <h3>Health opt-in policy</h3>
          <pre>${JSON.stringify(health, null, 2)}</pre>
          <h3>Approval queue</h3>
          <p>Mission approvals table above · <code>POST /v1/operator/mission/approve</code> (Bearer, Approve role)</p>`;
      } catch (e) {
        document.getElementById("tab-humans").innerHTML = `
          <h2>Human Interaction</h2>
          <p class="error">Load with spatial-computing <code>--config</code>. ${e}</p>`;
      }
    }

    async function loadSmartSpaces() {
      try {
        errEl.hidden = true;
        const [summary, dashboard, readiness, devices, health, security, environment, energyDetail, floorMap] = await Promise.all([
          api("/v1/smart-spaces/summary"),
          api("/v1/dashboard"),
          api("/v1/facilities/tower-demo/readiness").catch(() => api("/v1/facilities/home-demo/readiness")),
          api("/v1/smart-spaces/devices?facility_id=tower-demo").catch(() => ({})),
          api("/v1/facilities/tower-demo/health").catch(() => ({})),
          api("/v1/facilities/tower-demo/security").catch(() => ({})),
          api("/v1/zones/room-lobby/environment").catch(() => ({})),
          api("/v1/energy/systems/battery-001").catch(() => ({})),
          api("/v1/facilities/tower-demo/floor-map").catch(() => ({})),
        ]);
        const facilities = summary.facilities || {};
        const energy = summary.energy || {};
        const emergency = summary.emergency || {};
        const p = dashboard.device_pool || {};
        const facilityRows = (facilities.facilities || []).map((f) =>
          `<tr><td>${f.id}</td><td>${f.name || "—"}</td><td>${f.facility_type || "—"}</td></tr>`
        ).join("");
        const gatewayRows = (facilities.gateways || []).map((g) =>
          `<tr><td>${g.id}</td><td>${g.role || "—"}</td><td>${g.provider || "—"}</td><td>${g.failover_from || "—"}</td></tr>`
        ).join("");
        const energyRows = (energy.systems || []).map((s) =>
          `<tr><td>${s.id}</td><td>${s.type || "—"}</td><td>${s.provider || "—"}</td></tr>`
        ).join("");
        const zoneRows = (facilities.zones || []).map((z) =>
          `<tr><td>${z.id}</td><td>${z.name || "—"}</td><td>${z.facility || "—"}</td><td>${z.type || "—"}</td></tr>`
        ).join("");
        const continuityRows = (emergency.continuity_pairs || []).map((c) =>
          `<tr><td>${c.primary || "—"}</td><td>${c.backup || "—"}</td><td>${c.on_failure || "—"}</td></tr>`
        ).join("");
        const robotRows = (summary.robots || []).map((r) =>
          `<tr><td>${r.id}</td><td>${r.facility || "—"}</td><td>${r.type || "—"}</td><td>${r.provider || "—"}</td></tr>`
        ).join("");
        const wearableRows = (summary.wearables || []).map((w) =>
          `<tr><td>${w.id}</td><td>${w.human_id || "—"}</td><td>${w.type || "—"}</td><td>${w.provider || "—"}</td></tr>`
        ).join("");
        const trustRows = (readiness.trust_entries || summary.trust_entries || []).map((t) =>
          `<tr><td>${t.id}</td><td>${t.trust_level || "—"}</td><td>${t.health_status || "—"}</td><td>${t.provider || "—"}</td></tr>`
        ).join("");
        const factorChart = (readiness.factors || []).map((f) => {
          const score = Number(f.score || 0);
          return `<div style="display:grid;grid-template-columns:11rem 1fr 2.5rem;gap:0.5rem;align-items:center;margin:0.35rem 0;">
            <span>${f.dimension}</span>
            <div style="height:0.65rem;background:#21262d;border-radius:999px;overflow:hidden;">
              <div style="width:${Math.min(100, score)}%;height:100%;background:#3fb950;"></div>
            </div>
            <span style="text-align:right;color:#8b949e;">${score}</span>
          </div>`;
        }).join("");
        let occupancyBlock = "";
        try {
          const occ = await api("/v1/zones/floor-12/occupancy");
          const timelineRows = (occ.timeline || []).map((p) =>
            `<tr><td>${p.offset_minutes}</td><td>${p.count}</td><td>${p.flow}</td></tr>`
          ).join("");
          occupancyBlock = `<h3>Occupancy (floor-12)</h3><pre>${JSON.stringify(occ.occupancy, null, 2)}</pre>
            <h4>Timeline</h4><table><thead><tr><th>Offset min</th><th>Count</th><th>Flow</th></tr></thead><tbody>${timelineRows}</tbody></table>`;
        } catch (_) { /* optional */ }
        const deviceRows = (devices.devices || []).map((d) =>
          `<tr><td>${d.id}</td><td>${d.type || "—"}</td><td>${d.zone || "—"}</td><td>${d.health_status || "—"}</td></tr>`
        ).join("");
        const floorRows = (floorMap.zones || []).map((n) =>
          `<tr><td>${n.zone?.name || n.zone?.id || "—"}</td><td>${n.zone?.parent || "—"}</td><td>${n.device_count || 0}</td></tr>`
        ).join("");
        document.getElementById("tab-smart-spaces").innerHTML = `
          <h2>Smart Spaces &amp; Ambient Intelligence</h2>
          <p class="subtitle">Serve with <code>--config examples/solutions/smart-spaces/spanda.toml --program smart-building/floor_readiness.sd</code></p>
          <div class="grid">
            <div class="stat"><dt>Facilities</dt><dd>${facilities.count || 0}</dd></div>
            <div class="stat"><dt>Gateways</dt><dd>${(facilities.gateways || []).length}</dd></div>
            <div class="stat"><dt>Energy systems</dt><dd>${energy.count || 0}</dd></div>
            <div class="stat"><dt>Device pool healthy</dt><dd class="ok">${p.healthy || 0}</dd></div>
            <div class="stat"><dt>Readiness profile</dt><dd>${summary.readiness_profile || "smart_space"}</dd></div>
            <div class="stat"><dt>Emergency status</dt><dd>${emergency.status || "normal"}</dd></div>
          </div>
          <h3>Buildings</h3>
          <table><thead><tr><th>ID</th><th>Name</th><th>Type</th></tr></thead><tbody>${facilityRows || "<tr><td colspan=3>none</td></tr>"}</tbody></table>
          <h3>Gateways</h3>
          <table><thead><tr><th>ID</th><th>Role</th><th>Provider</th><th>Failover</th></tr></thead><tbody>${gatewayRows || "<tr><td colspan=4>none</td></tr>"}</tbody></table>
          <h3>Energy</h3>
          <table><thead><tr><th>ID</th><th>Type</th><th>Provider</th></tr></thead><tbody>${energyRows || "<tr><td colspan=3>none</td></tr>"}</tbody></table>
          <h3>Rooms &amp; zones</h3>
          <table><thead><tr><th>ID</th><th>Name</th><th>Facility</th><th>Type</th></tr></thead><tbody>${zoneRows || "<tr><td colspan=4>none</td></tr>"}</tbody></table>
          ${occupancyBlock}
          <h3>Robots</h3>
          <table><thead><tr><th>ID</th><th>Facility</th><th>Type</th><th>Provider</th></tr></thead><tbody>${robotRows || "<tr><td colspan=4>none</td></tr>"}</tbody></table>
          <h3>Wearables</h3>
          <table><thead><tr><th>ID</th><th>Human</th><th>Type</th><th>Provider</th></tr></thead><tbody>${wearableRows || "<tr><td colspan=4>none</td></tr>"}</tbody></table>
          <h3>Facility readiness — ${readiness.score ?? "—"}/100 (${readiness.status ?? "unknown"})</h3>
          ${factorChart || "<p>No factor chart</p>"}
          <h4>Trust inventory</h4>
          <table><thead><tr><th>Device</th><th>Trust</th><th>Health</th><th>Provider</th></tr></thead><tbody>${trustRows || "<tr><td colspan=4>none</td></tr>"}</tbody></table>
          <h3>Device inventory</h3>
          <table><thead><tr><th>ID</th><th>Type</th><th>Zone</th><th>Health</th></tr></thead><tbody>${deviceRows || "<tr><td colspan=4>none</td></tr>"}</tbody></table>
          <h3>Facility health</h3>
          <pre>${JSON.stringify(health, null, 2)}</pre>
          <h3>Security</h3>
          <pre>${JSON.stringify(security, null, 2)}</pre>
          <h3>Environmental</h3>
          <pre>${JSON.stringify(environment, null, 2)}</pre>
          <h3>Energy detail</h3>
          <pre>${JSON.stringify(energyDetail, null, 2)}</pre>
          <h3>Floor map</h3>
          <table><thead><tr><th>Zone</th><th>Parent</th><th>Devices</th></tr></thead><tbody>${floorRows || "<tr><td colspan=3>none</td></tr>"}</tbody></table>
          <h3>Emergency &amp; continuity</h3>
          <table><thead><tr><th>Primary</th><th>Backup</th><th>On failure</th></tr></thead><tbody>${continuityRows || "<tr><td colspan=3>none</td></tr>"}</tbody></table>
          <p>API: <code>GET /v1/smart-spaces/summary</code> · <code>GET /v1/facilities</code> · <code>GET /v1/energy/systems</code> · <code>GET /v1/emergency/status</code> · <code>GET /v1/zones/{id}/occupancy</code></p>`;
      } catch (e) {
        document.getElementById("tab-smart-spaces").innerHTML = `
          <h2>Smart Spaces</h2>
          <p class="error">Load with smart-spaces <code>--config</code>. ${e}</p>`;
      }
    }

    async function loadExecutive() {
      try {
        errEl.hidden = true;
        const score = await api("/v1/executive/scorecard");
        const analytics = await api("/v1/analytics/readiness?forecast_days=7");
        document.getElementById("tab-executive").innerHTML = `
          <h2>Executive dashboard</h2>
          <div class="grid">
            <div class="stat"><dt>Scorecard</dt><dd>${score.scorecard.overall_score}/100</dd></div>
            <div class="stat"><dt>Tier</dt><dd>${score.scorecard.tier}</dd></div>
            <div class="stat"><dt>Readiness samples</dt><dd>${analytics.analytics.sample_count}</dd></div>
          </div>
          <pre>${JSON.stringify(score.scorecard.categories, null, 2)}</pre>`;
      } catch (e) { showError(String(e)); }
    }

    loadDashboard();
  </script>
</body>
</html>

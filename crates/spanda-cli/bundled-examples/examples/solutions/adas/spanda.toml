[package]
name = "adas-blueprint"
version = "0.1.0"
description = "Official ADAS & Autonomous Driving Solution Blueprint"
license = "Apache-2.0"

[config]
devices = "spanda.devices.toml"

[dependencies]
spanda-gps = "0.1"
spanda-nav = "0.1"
spanda-mqtt = "0.1"
spanda-opencv = "0.1"
spanda-canbus = "0.1"
spanda-radar = "0.1"
spanda-lidar = "0.1"
spanda-ultrasonic = "0.1"
spanda-ros2 = "0.1"


[capabilities]
required = [
  "gps_navigation",
  "obstacle_avoidance",
  "autonomous_navigation",
  "vision_processing",
  "telemetry_streaming",
]

[safety]
level = "experimental"
profile = "iso26262"

[readiness]
min_score = 90
profile = "iso26262"
